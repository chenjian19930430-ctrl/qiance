version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: qiance-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: qiance
    volumes:
      - qiance-pgdata:/var/lib/postgresql/data

volumes:
  qiance-pgdata:
